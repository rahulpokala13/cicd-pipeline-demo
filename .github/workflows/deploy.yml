name: CI-CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        run: docker build -t cicd-pipeline-demo .

      - name: Tag Docker image
        run: docker tag cicd-pipeline-demo:latest 767397827032.dkr.ecr.ap-south-1.amazonaws.com/cicd-pipeline-demo:latest

      - name: Push Docker image
        run: docker push 767397827032.dkr.ecr.ap-south-1.amazonaws.com/cicd-pipeline-demo:latest